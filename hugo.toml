# ================= 基础站点配置 =================
baseURL = "https://felixchang84.github.io/my-bolg/"  # ✅ 已设置正确
title = "张佳轩博客"
theme = "hugo-coder"
languageCode = "zh"
defaultContentLanguage = "zh"
enableEmoji = true

# ================= 分页设置 =================
[pagination]
pagerSize = 6

# ================= 评论系统 =================
[services]
[services.disqus]
shortname = ""

# ================= 内容渲染引擎 =================
[markup]
[markup.highlight]
noClasses = false
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true

# ================= 全局参数 =================
[params]
author = "JoFuKi"
license = '[CC BY-SA-4.0](http://creativecommons.org/licenses/by-sa/4.0/)'
description = "技术分享与个人项目记录"
keywords = "blog, developer, python, hugo"
info = ["Full Stack Developer", "Python Enthusiast"]
avatarURL = "images/avatar.jpg"
dateFormat = "2006-01-02"
since = 2026
rtl = false
colorScheme = "auto"
hideColorSchemeToggle = false
maxSeeAlsoItems = 5
customCSS = []
customSCSS = []
customJS = []
customRemoteJS = []

# ================= 分类法 =================
[taxonomies]
category = "categories"
series = "series"
tag = "tags"
author = "authors"

# ================= 社交链接 =================
[[params.social]]
name = "Github"
icon = "fa-brands fa-github fa-2x"
weight = 1
url = "https://github.com/FelixChang84/"

[[params.social]]
name = "Bilibili"
icon = "fa-brands fa-bilibili fa-2x"
weight = 7
url = "https://space.bilibili.com/246517702/"

[[params.social]]
name = "抖音"
icon = "fa-brands fa-tiktok fa-2x"
